name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build:
    name: Export Godot → HTML5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.4.1-stable_linux.x86_64.zip
          sudo mv Godot_v4.4.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.4.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_export_templates.tpz
          unzip -q Godot_v4.4.1-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.4.1.stable/

      - name: Import project
        run: cd godot && godot --headless --import

      - name: Export Web build
        run: |
          mkdir -p build
          cd godot && godot --headless --export-release "Web" ../build/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-build
          path: build/

  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: godot-build
          path: build/

      - name: Install test deps
        run: |
          npm install @playwright/test serve
          npx playwright install --with-deps chromium

      - name: Prepare site
        run: |
          mkdir -p _site/game
          cp index.html data.json _site/
          cp -r build/* _site/game/

      - name: Run tests
        run: npx playwright test
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            tests/screenshots/
            tests/results.json
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build  # Does NOT need test — decoupled
    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: godot-build
          path: build/

      - name: Assemble site
        run: |
          mkdir -p _site/game
          cp index.html data.json _site/
          cp -r build/* _site/game/
          touch _site/.nojekyll

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
