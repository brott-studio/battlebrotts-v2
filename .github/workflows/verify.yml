name: Verify

on:
  pull_request:
    branches: [main]

jobs:
  godot-tests:
    name: Godot Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.4.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.4.1-stable_linux.x86_64
          sudo mv Godot_v4.4.1-stable_linux.x86_64 /usr/local/bin/godot

      - name: Import Godot resources
        run: godot --headless --path godot/ --import 2>&1 || true

      - name: Run Godot tests
        run: |
          godot --headless --path godot/ --script res://tests/test_runner.gd
          godot --headless --path godot/ --script res://tests/test_sprint13_2.gd
          godot --headless --path godot/ --script res://tests/test_sprint13_3.gd
          godot --headless --path godot/ --script res://tests/test_sprint13_4.gd
          godot --headless --path godot/ --script res://tests/test_sprint13_5.gd
          godot --headless --path godot/ --script res://tests/test_sprint13_6.gd
          godot --headless --path godot/ --script res://tests/test_sprint13_7.gd

  playwright:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install @playwright/test serve
          npx playwright install --with-deps chromium

      - name: Prepare site for testing
        run: |
          mkdir -p _site/game
          cp index.html data.json _site/
          if [ -d build ] && [ -f build/index.html ]; then
            cp -r build/* _site/game/
          else
            echo '<html><head><title>BattleBrotts</title></head><body>Placeholder</body></html>' > _site/game/index.html
          fi

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/screenshots/
          retention-days: 7
