name: readme-status

on:
  push:
    branches: [main]
    # Loop guard: when this workflow's PR is squash-merged into main, the
    # only changed path is README.md. Ignoring it on push prevents the
    # auto-update from re-triggering itself, while still running on any
    # other push to main.
    paths-ignore:
      - "README.md"
  schedule:
    # 12:00 UTC daily = 08:00 EST / 07:00 EDT — morning coffee refresh.
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Belt: skip self-made commits (paths-ignore above is the suspenders).
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT so subsequent push + PR ops (incl. auto-merge enable)
          # carry permissions that the default GITHUB_TOKEN lacks under
          # branch-protected main.
          token: ${{ secrets.BROTT_STUDIO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate README status block
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BROTT_STUDIO_PAT: ${{ secrets.BROTT_STUDIO_PAT }}
        run: python3 scripts/update-readme-status.py

      - name: Open or update status PR if README changed
        env:
          GH_TOKEN: ${{ secrets.BROTT_STUDIO_PAT }}
          BRANCH: auto/readme-status-update
          BASE: main
          TITLE: "chore(readme): auto-update status block"
        run: |
          set -euo pipefail

          # Exit cleanly when the script produced no changes.
          if git diff --quiet -- README.md; then
            echo "No README changes — nothing to commit."
            exit 0
          fi

          git config user.name  "The Bott"
          git config user.email "thebott@brott-studio.studio"

          # Stash the regenerated README, reset to a clean branch rooted at
          # base, then re-apply. This keeps the PR branch a single-commit,
          # always-current diff vs. main (no stale accumulation across runs).
          cp README.md /tmp/readme.new
          git fetch origin "$BASE"
          git checkout -B "$BRANCH" "origin/$BASE"
          cp /tmp/readme.new README.md

          if git diff --quiet -- README.md; then
            echo "README is already current vs. base — nothing to PR."
            exit 0
          fi

          git add README.md
          git commit -m "${TITLE} [skip ci]"
          git push --force-with-lease origin "$BRANCH"

          # Idempotent: reuse an open PR from this branch if one exists.
          existing_pr="$(gh pr list --head "$BRANCH" --base "$BASE" --state open --json number --jq '.[0].number' || true)"
          if [ -z "${existing_pr}" ]; then
            gh pr create \
              --base "$BASE" \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "$(printf '%s\n' 'Automated status-block refresh. See `.github/workflows/readme-status.yml`.' '' '- Generated by `scripts/update-readme-status.py`' '- Loop-guarded via `paths-ignore: [README.md]` on the push trigger' '- Auto-merge (squash) is enabled; PR will merge itself once required checks pass')"
            existing_pr="$(gh pr list --head "$BRANCH" --base "$BASE" --state open --json number --jq '.[0].number')"
            echo "Opened PR #${existing_pr}."
          else
            echo "Updated existing PR #${existing_pr}."
          fi

          # Enable auto-merge (squash). Safe to call repeatedly.
          gh pr merge "$existing_pr" --auto --squash || \
            echo "[warn] Failed to enable auto-merge on #${existing_pr} — manual merge may be required."
